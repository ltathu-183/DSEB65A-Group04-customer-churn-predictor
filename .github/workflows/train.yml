name: Model Training Pipeline (CT)

# Trigger the workflow on manual dispatch or code changes in models/data
on:
  workflow_dispatch:
  push:
    paths:
      - "src/models/**"
      - "data/**"
      - "config/**"

jobs:
  train-and-log:
    name: Continuous Training with MLflow & DVC
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the source code from GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install uv package manager and DVC for data retrieval
      - name: Install uv and DVC
        run: |
          pip install uv
          pip install dvc dvc-s3

      # 4. Authenticate DVC and pull data from DagsHub
      - name: Pull Data from DVC Remote
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          # Configure local authentication for DVC using the GitHub Secret
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user __token__
          dvc remote modify origin --local password $DAGSHUB_TOKEN
          # Pull training data tracked by DVC
          dvc pull data/raw/train.csv.dvc

      # 5. Install Python dependencies defined in pyproject.toml
      - name: Install Dependencies
        run: uv pip install --system -r requirements.txt mlflow dvc dvc-s3

      # 6. Run the training script and log results to DagsHub MLflow
      - name: Execute Training Script
        env:
          # Remote MLflow tracking configuration for DagsHub
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ github.repository }}.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ github.actor }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          # Use n_iter=2 to prevent the GitHub Runner from timing out during hyperparameter search
          python src/models/train_model.py \
            --data data/raw/train.csv \
            --model_dir models \
            --n_iter 2

      # 7. Upload the trained model and baseline stats as CI artifacts
      - name: Upload Training Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-run-artifacts
          path: |
            models/model.pkl
            models/baseline_stats.json
            models/LATEST_VERSION.txt