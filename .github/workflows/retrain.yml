name: Retrain Model

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 2 * * 0"

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write      # Required for create-pull-request action
      pull-requests: write # Required to create PR
      actions: read
      issues: write        # Required to use 'gh issue create'
    
    env:
      DRIFT_CONFIG: "config/drift_config.yaml"
      MODEL_DIR: "models"
      DATA_PATH: "data/raw/train.csv"
    
    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Python & uv
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv cache
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # 3. Install dependencies
      - name: Install dependencies
        run: uv pip install . dvc[s3] --system

      # 4. Pull Data from DVC
      - name: Pull training data from DVC
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
          DAGSHUB_S3_ENDPOINT_URL: ${{ secrets.DAGSHUB_S3_ENDPOINT_URL }}
        run: |
          dvc remote modify origin --local access_key_id $AWS_ACCESS_KEY_ID
          dvc remote modify origin --local secret_access_key $AWS_SECRET_ACCESS_KEY
          dvc remote modify origin --local endpointurl $DAGSHUB_S3_ENDPOINT_URL

          dvc pull ${{ env.DATA_PATH }}.dvc || echo "Warning: DVC pull failed"
          
          if [ ! -f "${{ env.DATA_PATH }}" ]; then
            echo "::error::Training data not found at ${{ env.DATA_PATH }}"
            exit 1
          fi

      # 5. Setup Models Dir
      - name: Verify Models Directory
        run: mkdir -p ${{ env.MODEL_DIR }}

      # 6. Train model
      - name: Train and Save Model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          echo "Starting training pipeline..."
          python src/models/train_model.py \
            --data ${{ env.DATA_PATH }} \
            --model_dir ${{ env.MODEL_DIR }} \
            --config ${{ env.DRIFT_CONFIG }} \
            --n_iter 15

          # Verify flat files strictly (Our Python script guarantees they exist here)
          test -f "${{ env.MODEL_DIR }}/model.pkl" || (echo "::error::model.pkl missing" && exit 1)
          test -f "${{ env.MODEL_DIR }}/metadata.json" || (echo "::error::metadata.json missing" && exit 1)
          test -f "${{ env.MODEL_DIR }}/baseline_stats.json" || (echo "::error::baseline_stats.json missing" && exit 1)
          
      # 7. Model Quality Gate (Fail-Fast)
      - name: Model Quality Gate
        run: |
          echo "Verifying model quality thresholds..."
          python -m pytest tests/test_model_quality.py -v

      
      # 8. Upload Training Artifacts
      - name: Upload Training Artifacts
        if: success() # Only upload if training AND quality gate passed
        uses: actions/upload-artifact@v4
        with:
          name: model-run-artifacts-${{ github.run_id }}
          path: |
            ${{ env.MODEL_DIR }}/model.pkl
            ${{ env.MODEL_DIR }}/metadata.json
            ${{ env.MODEL_DIR }}/baseline_stats.json
            ${{ env.MODEL_DIR }}/LATEST_VERSION.txt

      # 9. Push Heavy Model to DVC Remote
      - name: Push Model to DagsHub via DVC
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
          DAGSHUB_S3_ENDPOINT_URL: ${{ secrets.DAGSHUB_S3_ENDPOINT_URL }}
        run: |
          # Re-apply remote config safely before push
          dvc remote modify origin --local access_key_id $AWS_ACCESS_KEY_ID
          dvc remote modify origin --local secret_access_key $AWS_SECRET_ACCESS_KEY
          dvc remote modify origin --local endpointurl $DAGSHUB_S3_ENDPOINT_URL

          # Track the heavy binary
          dvc add ${{ env.MODEL_DIR }}/model.pkl
          
          # Upload to remote storage
          dvc push || (echo "::error::DVC push failed." && exit 1)

      # 10. Create PR for GitHub
      - name: Create Pull Request for New Model
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN}}
          commit-message: "auto-retrain: update model [run=${{ github.run_id }}]"
          branch: "automated-model-update"
          title: "MLOps Auto-Retrain: New Model Available"
          body: |
            ### Automated Model Retraining
            A new model has been trained. The binary is safely tracked in DagsHub via DVC.
            
            **Action Required:**
            Review `models/metadata.json` and merge this PR to promote the model to production.
          labels: "mlops, auto-retrain"
          add-paths: |
            models/model.pkl.dvc
            models/metadata.json
            models/baseline_stats.json
            models/LATEST_VERSION.txt

      # 11. Notify results on Failure
      - name: Notify Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN}}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue create \
            --title "Model Retraining Failed: Run #${{ github.run_id }}" \
            --body "Workflow failed. Check logs: ${RUN_URL}" \
            --label "mlops,training-failed" \
            2>/dev/null || echo "Could not create issue"