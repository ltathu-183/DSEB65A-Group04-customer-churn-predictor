name: Drift Monitoring

on:
  schedule:
    - cron: "0 * * * *"  # Every hour
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies and DVC
        run: |
          uv pip install . dvc[s3] --system
      - name: DVC debug info
        run: |
          echo ">>> Python / uv / dvc versions"
          python --version || true
          uv --version || true
          python -c "import dvc; print('dvc', dvc.__version__)" || dvc --version || true

          echo ">>> Check env (masked)"
          echo "DAGSHUB_S3_ENDPOINT_URL=${DAGSHUB_S3_ENDPOINT_URL:+set}"
          echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:+set}"
          echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:+set}"

          echo ">>> Show dvc remotes and config"
          cat .dvc/config 2>/dev/null || true
          ls -la
          dvc remote list || true
          dvc remote list -v || true
          dvc status -c || true
      - name: Pull Data from DVC
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
          DAGSHUB_S3_ENDPOINT_URL: ${{ secrets.DAGSHUB_S3_ENDPOINT_URL }}
        run: |
          # Configure runner-local DVC remote credentials and endpoint
          dvc remote modify origin --local access_key_id $AWS_ACCESS_KEY_ID
          dvc remote modify origin --local secret_access_key $AWS_SECRET_ACCESS_KEY
          dvc remote modify origin --local endpointurl $DAGSHUB_S3_ENDPOINT_URL

          dvc pull data/raw/train.csv.dvc || echo "Warning: DVC pull failed"
          if [ -f "data/raw/new_dataset.csv.dvc" ]; then
            dvc pull data/raw/new_dataset.csv.dvc || echo "Warning: DVC pull failed for new dataset"
          fi

      - name: Install GitHub CLI (for issue creation)
        run: |
          type -p curl >/dev/null || sudo apt update && sudo apt install curl -y
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update && sudo apt install gh -y

      - name: Run Drift Detection
        id: drift_check
        run: |
          python monitoring/detect_drift.py \
            --ref data/raw/train.csv \
            --curr data/raw/new_dataset.csv \
            --model_dir models \
            --config config/drift_config.yaml
        env:
          TOKENFORMLOPS: ${{ secrets.TOKENFORMLOPS }}

      - name: Check for critical drift in logs
        if: always()
        id: check_drift
        run: |
          if grep -q "CRITICAL DRIFT DETECTED" logs/monitoring.log 2>/dev/null; then
            echo "critical_drift=true" >> $GITHUB_OUTPUT
            echo "Critical drift detected in logs"
          else
            echo "critical_drift=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload monitoring logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      - name: Create Issue Alert
        if: failure() || steps.check_drift.outputs.critical_drift == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GH CLI will use the provided GITHUB_TOKEN env var; no interactive login required

          STATUS="${{ job.status }}"
          DRIFT_STATUS=$([ "${{ steps.check_drift.outputs.critical_drift }}" = "true" ] && echo "Detected" || echo "None")

          # Diagnostic: show GH auth status to help debug failures (non-fatal)
          gh auth status || true

          # Build issue body into a temp file to avoid heredoc/indentation problems
          ISSUE_FILE=$(mktemp /tmp/issue_body.XXXXXX)
          printf '%s
          ' "### Status" \
            "• Workflow: ${{ github.workflow }}" \
            "• Result: ${STATUS}" \
            "• Critical Drift: ${DRIFT_STATUS}" \
            "" \
            "### Details" \
            "• Run Link: [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            "• Artifacts: [Download logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            "" \
            "### Action Required" \
            "1. Check uploaded artifacts for monitoring.log" \
            "2. Review drift details in log file" \
            "3. Verify if auto-retrain was triggered" \
            "4. Investigate data quality if needed" > "$ISSUE_FILE"

          gh issue create \
            --title "Drift Alert: ${{ github.repository }} #${{ github.run_id }}" \
            --body-file "$ISSUE_FILE" || { echo "gh issue create failed (exit $?)"; rm -f "$ISSUE_FILE"; exit 1; }
          rm -f "$ISSUE_FILE"
