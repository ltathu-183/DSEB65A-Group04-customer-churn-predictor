name: MLOps End-to-End Validation Pipeline (DAG)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # NODE 1: Static Code Analysis (Fail-Fast)
  # ==========================================
  lint:
    name: Code Linting (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Use official uv action - it automatically handles aggressive caching!
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: uv pip install ruff --system

      - name: Run Ruff
        run: |
          echo "Executing ruff..."
          ruff check src/ streamlit_app/ || (echo "::error::Ruff found issues" && exit 1)

  # ==========================================
  # NODE 2: Data & Integration Validation
  # ==========================================
  build-and-validate:
    name: DVC Pull & Docker Validation
    needs: lint  # DAG logic: Only run heavy operations if code is clean
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
      DAGSHUB_S3_ENDPOINT_URL: ${{ secrets.DAGSHUB_S3_ENDPOINT_URL }}
    
    # All steps here run on the SAME Virtual Machine, sharing the local disk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DVC
        run: uv pip install dvc[s3] --system

      # Step 1: Pull heavy artifacts to current VM disk
      - name: Configure DVC remote and pull
        run: |
          # Configure runner-local remote credentials
          dvc remote modify origin --local access_key_id $AWS_ACCESS_KEY_ID
          dvc remote modify origin --local secret_access_key $AWS_SECRET_ACCESS_KEY
          dvc remote modify origin --local endpointurl $DAGSHUB_S3_ENDPOINT_URL

          # Pull artifacts
          dvc pull --verbose || (echo "::error::DVC pull failed." && exit 1)

      # Step 2: Verify artifacts on the SAME VM
      - name: Verify artifacts existence
        run: |
          echo "Verifying pulled files..."
          test -f models/model.pkl || (echo "::error::models/model.pkl missing" && exit 1)
          test -f data/raw/train.csv || (echo "::error::data/raw/train.csv missing" && exit 1)
          echo "✅ Essential files present"

      # Step 3: Build Docker (which needs the pulled model/data to exist on disk)
      - name: Dry-run Docker builds
        run: |
          echo "Building FastAPI backend image..."
          docker build -t fastapi-test -f Dockerfile . || (echo "::error::Docker build backend failed" && exit 1)

          echo "Building Streamlit frontend image..."
          docker build -t streamlit-test -f streamlit_app/Dockerfile ./streamlit_app || (echo "::error::Docker build frontend failed" && exit 1)

          echo "Validating Docker Compose configuration..."
          docker compose config || (echo "::error::docker compose config invalid" && exit 1)