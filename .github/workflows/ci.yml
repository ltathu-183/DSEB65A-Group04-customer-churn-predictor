name: MLOps End-to-End Validation Pipeline (DAG)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # NODE 1: Static Code Analysis (Non-blocking)
  lint:
    name: Code Linting (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: uv pip install ruff --system

      - name: Run Ruff (Non-blocking)
        continue-on-error: true # Allow pipeline to continue with warnings
        run: |
          echo "Executing ruff..."
          ruff check src/ streamlit_app/ --format=github

  # NODE 2: Logic Validation (Fail-Fast)
  unit-test:
    name: Unit & Integration Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Pytest
        run: |
          # Install current project and test dependencies
          uv pip install . pytest httpx --system
          # Run core logic tests
          python -m pytest tests/test_api.py tests/test_data_pipeline.py -v

  # NODE 3: Data & Docker Validation
  build-and-validate:
    name: DVC Pull & Docker Validation
    needs: unit-test # CRITICAL: Only build if business logic tests pass
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
      DAGSHUB_S3_ENDPOINT_URL: ${{ secrets.DAGSHUB_S3_ENDPOINT_URL }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DVC
        run: uv pip install dvc[s3] --system

      - name: Configure DVC and pull
        run: |
          dvc remote modify origin --local access_key_id $AWS_ACCESS_KEY_ID
          dvc remote modify origin --local secret_access_key $AWS_SECRET_ACCESS_KEY
          dvc remote modify origin --local endpointurl $DAGSHUB_S3_ENDPOINT_URL
          dvc pull --verbose

      - name: Verify artifacts existence
        run: |
          test -f models/model.pkl || (echo "::error::models/model.pkl missing" && exit 1)
          test -f data/raw/train.csv || (echo "::error::data/raw/train.csv missing" && exit 1)

      - name: Dry-run Docker builds
        run: |
          docker build -t fastapi-test -f Dockerfile .
          docker build -t streamlit-test -f streamlit_app/Dockerfile ./streamlit_app
          docker compose config